---
name: Silta chart tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  validate:
    name: Validate — ${{ matrix.chart }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: [drupal, frontend, simple]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Add dependency repos
        run: |
          helm repo add wunderio https://storage.googleapis.com/charts.wdr.io
          helm repo add jouve https://jouve.github.io/charts/
          helm repo add percona https://percona.github.io/percona-helm-charts/
          helm repo update

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.1

      - name: Build chart dependencies
        run: helm dependency build ./${{ matrix.chart }}

      - name: Lint chart
        run: helm lint ./${{ matrix.chart }}

      - name: Unit tests
        run: helm unittest ./${{ matrix.chart }}

      - name: Dry-run install
        run: |
          helm install --dry-run --generate-name ./${{ matrix.chart }} \
            --values ${{ matrix.chart }}/test.values.yaml
